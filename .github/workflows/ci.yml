name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run typecheck
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - site-service
          - monitoring-service
          - ticket-service
          - billing-service
          - partner-service
          - notification-service
          - websocket-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/node-service.Dockerfile
          push: true
          build-args: |
            SERVICE_PATH=services/${{ matrix.service }}
          tags: ghcr.io/${{ github.repository_owner }}/netlayer-${{ matrix.service }}:latest
