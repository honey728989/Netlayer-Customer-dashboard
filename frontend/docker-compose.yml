version: '3.9'

services:
  # NOC Panel
  noc:
    build:
      context: .
      dockerfile: apps/noc/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_WS_URL=ws://backend:8000
      - VITE_GRAFANA_URL=http://grafana:3000
      - VITE_ZABBIX_URL=http://zabbix:8080
    depends_on:
      - backend

  # Customer Portal
  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    ports:
      - '3002:3002'
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_WS_URL=ws://backend:8000
      - VITE_GRAFANA_URL=http://grafana:3000
    depends_on:
      - backend

  # Partner Portal
  partner:
    build:
      context: .
      dockerfile: apps/partner/Dockerfile
    ports:
      - '3003:3003'
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_WS_URL=ws://backend:8000
    depends_on:
      - backend

  # Nginx reverse proxy (optional, routes by subdomain/path)
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - noc
      - portal
      - partner

networks:
  default:
    name: netlayer-network
