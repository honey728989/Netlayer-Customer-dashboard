events {
  worker_connections 1024;
}

http {
  upstream noc_upstream     { server noc:3001; }
  upstream portal_upstream  { server portal:3002; }
  upstream partner_upstream { server partner:3003; }

  # ── NOC Panel — noc.netlayer.internal ──────────────────────────────────────
  server {
    listen 80;
    server_name noc.netlayer.internal noc.netlayer.com;

    location / {
      proxy_pass         http://noc_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # WebSocket proxy
    location /ws {
      proxy_pass         http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }
  }

  # ── Customer Portal — portal.netlayer.com ──────────────────────────────────
  server {
    listen 80;
    server_name portal.netlayer.com;

    location / {
      proxy_pass         http://portal_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    location /ws {
      proxy_pass         http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }
  }

  # ── Partner Portal — partner.netlayer.com ──────────────────────────────────
  server {
    listen 80;
    server_name partner.netlayer.com;

    location / {
      proxy_pass         http://partner_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    location /ws {
      proxy_pass         http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }
  }
}
