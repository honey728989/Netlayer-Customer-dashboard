apiVersion: v1
kind: Namespace
metadata:
  name: netlayer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: netlayer-config
  namespace: netlayer
data:
  NODE_ENV: production
  LOG_LEVEL: info
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: netlayer
  POSTGRES_USER: netlayer
  REDIS_URL: redis://redis:6379
  RATE_LIMIT_MAX: "200"
  RATE_LIMIT_WINDOW: 1 minute
  AUTH_SERVICE_URL: http://auth-service:4001
  SITE_SERVICE_URL: http://site-service:4002
  MONITORING_SERVICE_URL: http://monitoring-service:4003
  TICKET_SERVICE_URL: http://ticket-service:4004
  BILLING_SERVICE_URL: http://billing-service:4005
  PARTNER_SERVICE_URL: http://partner-service:4006
---
apiVersion: v1
kind: Secret
metadata:
  name: netlayer-secrets
  namespace: netlayer
type: Opaque
stringData:
  POSTGRES_PASSWORD: change-me
  JWT_ACCESS_SECRET: change-me
  JWT_REFRESH_SECRET: change-me
  JWT_ISSUER: netlayer
  JWT_AUDIENCE: netlayer-platform
  INTERNAL_SERVICE_TOKEN: change-me
  ZABBIX_URL: https://zabbix.example.com
  ZABBIX_USERNAME: api-user
  ZABBIX_PASSWORD: api-password
  ZOHO_BOOKS_BASE_URL: https://www.zohoapis.in/books/v3
  ZOHO_BOOKS_ORGANIZATION_ID: organization-id
  ZOHO_BOOKS_CLIENT_ID: client-id
  ZOHO_BOOKS_CLIENT_SECRET: client-secret
  ZOHO_BOOKS_REFRESH_TOKEN: refresh-token
  GRAFANA_BASE_URL: https://grafana.example.com
  GRAFANA_EMBED_SIGNING_SECRET: change-me
  GRAFANA_DASHBOARD_UID: customer-overview
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: netlayer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/your-org/netlayer-api-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: netlayer-config
            - secretRef:
                name: netlayer-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: netlayer
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-service
  namespace: netlayer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-service
  template:
    metadata:
      labels:
        app: websocket-service
    spec:
      containers:
        - name: websocket-service
          image: ghcr.io/your-org/netlayer-websocket-service:latest
          ports:
            - containerPort: 4008
          envFrom:
            - configMapRef:
                name: netlayer-config
            - secretRef:
                name: netlayer-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-service
  namespace: netlayer
spec:
  selector:
    app: websocket-service
  ports:
    - port: 4008
      targetPort: 4008
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netlayer-ingress
  namespace: netlayer
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: nginx
  rules:
    - host: api.netlayer.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: websocket-service
                port:
                  number: 4008
