apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: netlayer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/your-org/netlayer-auth-service:latest
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: netlayer-config
            - secretRef:
                name: netlayer-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: netlayer
spec:
  selector:
    app: auth-service
  ports:
    - port: 4001
      targetPort: 4001
---
